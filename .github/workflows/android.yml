name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
          cache-read-only: false

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin --no-daemon


      - name: Generate release keystore (or restore from secret)
        run: |
          if [ -n "${{ secrets.FIXD_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.FIXD_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          else
            keytool -genkeypair -v -keystore release.keystore \
              -alias fixd -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass fixdmessaging -keypass fixdmessaging \
              -dname "CN=Fixd Messaging, OU=Fixd, O=Fixd.fun, L=City, S=State, C=US"
          fi
        env:
          FIXD_KEYSTORE_PASSWORD: ${{ secrets.FIXD_KEYSTORE_PASSWORD || 'fixdmessaging' }}
          FIXD_KEY_PASSWORD: ${{ secrets.FIXD_KEY_PASSWORD || 'fixdmessaging' }}

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fixd-messaging-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/outputs/logs
          if-no-files-found: ignore
          retention-days: 7

      - name: Build release APK & AAB
        env:
          FIXD_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          FIXD_KEYSTORE_PASSWORD: ${{ secrets.FIXD_KEYSTORE_PASSWORD || 'fixdmessaging' }}
          FIXD_KEY_ALIAS: fixd
          FIXD_KEY_PASSWORD: ${{ secrets.FIXD_KEY_PASSWORD || 'fixdmessaging' }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fixd-messaging-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fixd-messaging-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

